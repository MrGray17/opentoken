name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run --filter=@mrgray17/opentoken build
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run checks:regex
      - run: bun test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: "22"

      - name: Configure npm auth
        run: |
          printf '//registry.npmjs.org/:_authToken=%s\nregistry=https://registry.npmjs.org/\n' "$NODE_AUTH_TOKEN" > "$NPM_CONFIG_USERCONFIG"
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mrgray17/opentoken-core
        run: |
          VER=${GITHUB_REF_NAME#v}
          if npm view @mrgray17/opentoken-core@$VER version &>/dev/null; then
            echo "core@$VER already published, skipping"
          else
            npm publish --access public
          fi
        working-directory: packages/core

      - name: Publish @mrgray17/opentoken-cli
        run: |
          VER=${GITHUB_REF_NAME#v}
          sed -i "s|\"workspace:*\"|\"^$VER\"|g" package.json
          if npm view @mrgray17/opentoken-cli@$VER version &>/dev/null; then
            echo "cli@$VER already published, skipping"
          else
            npm publish --access public
          fi
        working-directory: packages/cli

      - name: Publish @mrgray17/opentoken-mcp
        run: |
          VER=${GITHUB_REF_NAME#v}
          sed -i "s|\"workspace:*\"|\"^$VER\"|g" package.json
          if npm view @mrgray17/opentoken-mcp@$VER version &>/dev/null; then
            echo "mcp@$VER already published, skipping"
          else
            npm publish --access public
          fi
        working-directory: packages/mcp

      - name: Publish @mrgray17/opentoken
        run: |
          VER=${GITHUB_REF_NAME#v}
          sed -i "s|\"workspace:*\"|\"^$VER\"|g" package.json
          if npm view @mrgray17/opentoken@$VER version &>/dev/null; then
            echo "opencode@$VER already published, skipping"
          else
            npm publish --access public
          fi
        working-directory: packages/opencode

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
